[package]
name = "native-window"
version = "0.1.0"
edition = "2024"

[lib]
crate-type = ["cdylib"]

[dependencies]
napi = { version = "3", features = ["napi8"] }
napi-derive = "3"
url = "2"
tao = { version = "0.34.5", features = ["rwh_06"] }
# NOTE: The "devtools" feature is always compiled in. DevTools are disabled at
# runtime by default (options.devtools defaults to false). Production deployments
# should never enable devtools, as it grants full DOM/JS inspection access.
wry = { version = "0.54.2", features = ["devtools", "protocol"] }
http = "1"

# Windows-only: kept for runtime.rs (WebView2 detection/install)
[target.'cfg(target_os = "windows")'.dependencies]
webview2-com = "0.38"
windows = { version = "0.61", features = ["Win32_System_Com"] }

# Windows/Linux-only: icon loading (PNG/ICO decoding)
[target.'cfg(not(target_os = "macos"))'.dependencies]
image = { version = "0.25", default-features = false, features = ["ico", "png"] }

# macOS-only: raw NSApp event drain for reliable WebKit event processing
[target.'cfg(target_os = "macos")'.dependencies]
objc2 = "0.6"
objc2-app-kit = "0.3"
objc2-foundation = "0.3"

[build-dependencies]
napi-build = "2"

[profile.release]
lto = true
strip = "symbols"
overflow-checks = true
